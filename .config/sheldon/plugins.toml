shell = "zsh"

# サプライチェーン対策: 各プラグインを特定コミットに固定 (rev)。
# 更新時はリポジトリの差分をレビューした上で rev を手動で更新すること。
# 末尾コメントは固定コミット時点のバージョン (タグ/日付)。
# `# branch:` 行は sheldon は無視するが Renovate の customManager が currentValue として読み取る。

[plugins]

# 履歴のサブストリング検索
[plugins.zsh-history-substring-search]
github = "zsh-users/zsh-history-substring-search"
# branch: master
rev = "14c8d2e0ffaee98f2df9850b19944f32546fdea5"

# コマンド実行時間を計測 (wakatime)
[plugins.zsh-wakatime]
github = "wbinglee/zsh-wakatime"
# branch: master
rev = "98a877680cbf4a2360df7fa0ffc38b6f2b5cd1a0"

# cd 強化
[plugins.enhancd]
github = "b4b4r07/enhancd"
# branch: main
rev = "5afb4eb6ba36c15821de6e39c0a7bb9d6b0ba415"
use = ["init.sh"]

# 入力中のコマンドに対し履歴から fish 風のインライン予測を表示 (`→` で確定)
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
# branch: master
rev = "85919cd1ffa7d2d5412f6d3fe437ebdbeeec4fc5"

# シンタックスハイライトは最後に読み込む必要がある
[plugins.zsh-syntax-highlighting]
github = "zsh-users/zsh-syntax-highlighting"
# branch: master
rev = "1d85c692615a25fe2293bdd44b34c217d5d2bf04"
