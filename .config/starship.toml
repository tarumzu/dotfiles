# 時刻を右側に表示 (旧 RPROMPT="[%*]" 相当)
right_format = "$time"

# 直前コマンドの成否で顔文字が変わるプロンプト (旧 liquidprompt prompt_tag 相当)
[character]
success_symbol = "[* '-'）](bold green)"
error_symbol = "[*｀д´）](bold red)"

[time]
disabled = false
format = "[\\[$time\\]]($style) "
time_format = "%H:%M:%S"
style = "white"

# Java / Kotlin のバージョン (Android プロジェクトを跨いだ時の取り違え防止)
# 検出元: pom.xml / build.gradle(.kts) / .java-version / .kt(.kts) ファイル等
# JDK / kotlinc が PATH に無い時はモジュール自体が非表示になるので無害
[java]
style = "bold red"   # default "red dimmed" は light テーマで読みにくい

[kotlin]
style = "bold magenta"
