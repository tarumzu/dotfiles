name: shellcheck

on:
  push:
    branches: [master]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: shellcheck all tracked *.sh
        run: |
          set -euo pipefail
          # リポジトリ内の全 .sh を対象 (.git 配下は除外)。スクリプトが
          # 増えても拾えるように glob で列挙する。1 つも無ければ no-op。
          mapfile -t files < <(find . -type d -name .git -prune -o -type f -name '*.sh' -print)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no shell scripts to check"
            exit 0
          fi
          shellcheck "${files[@]}"
