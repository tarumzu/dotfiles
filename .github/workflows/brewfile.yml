name: brewfile

on:
  push:
    branches: [main]
    paths:
      - "Brewfile"
      - ".github/workflows/brewfile.yml"
  pull_request:
    paths:
      - "Brewfile"
      - ".github/workflows/brewfile.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Verify every tap / formula / cask in Brewfile resolves
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          set -euo pipefail

          # Brewfile はテキスト抽出で評価する (Ruby 条件式の真偽に関わらず存在検証する)
          taps=$(grep -E '^tap[[:space:]]+"' Brewfile | sed -E 's/^tap[[:space:]]+"([^"]+)".*/\1/' || true)
          brews=$(grep -E '^brew[[:space:]]+"' Brewfile | sed -E 's/^brew[[:space:]]+"([^"]+)".*/\1/' || true)
          casks=$(grep -E '^cask[[:space:]]+"' Brewfile | sed -E 's/^cask[[:space:]]+"([^"]+)".*/\1/' || true)

          while IFS= read -r t; do
            [ -z "$t" ] && continue
            echo "::group::tap $t"
            brew tap "$t"
            echo "::endgroup::"
          done <<< "$taps"

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Checking formula: $f"
            brew info --formula "$f" >/dev/null
          done <<< "$brews"

          while IFS= read -r c; do
            [ -z "$c" ] && continue
            echo "Checking cask: $c"
            brew info --cask "$c" >/dev/null
          done <<< "$casks"
