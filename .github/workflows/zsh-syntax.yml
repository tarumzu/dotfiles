name: zsh-syntax

on:
  push:
    branches: [main]
    paths:
      - "**/*.zsh"
      - ".zshrc"
      - ".github/workflows/zsh-syntax.yml"
  pull_request:
    paths:
      - "**/*.zsh"
      - ".zshrc"
      - ".github/workflows/zsh-syntax.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zsh
      - name: zsh -n on all .zsh files
        run: |
          set -euo pipefail
          # .zshrc は拡張子が異なるので明示的に含める。
          # find は .git 配下や node_modules を素直に除外する。
          mapfile -t files < <(find . -type d \( -name .git -o -name node_modules \) -prune -o -type f \( -name '*.zsh' -o -name '.zshrc' \) -print)
          for f in "${files[@]}"; do
            echo "::group::$f"
            zsh -n "$f"
            echo "::endgroup::"
          done
